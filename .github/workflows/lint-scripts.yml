name: ESLint

on:
  push:
    branches:
      - main
      - dev
    paths:
      - '**/*.ts'
      - '.github/workflows/lint-scripts.yml'
      - 'src/config/eslint.config.ts'
  pull_request:
    branches:
      - main
    paths:
      - '**/*.ts'
      - '.github/workflows/lint-scripts.yml'
      - 'src/config/eslint.config.ts'
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun ci

      - name: Lint scripts
        run: bun lint:scripts
