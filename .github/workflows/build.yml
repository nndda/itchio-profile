name: Build

on:
  push:
    branches:
      - main
    paths:
      - 'src/'
      - '.github/workflows/build.yml'
      - 'package*.json'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun ci

      - name: Build HTML + CSS
        run: npm run build

      - name: Checksum output files
        run: sha512sum dist/*
